# Edge Crew v3.0 - Railway Deployment
# Deploy with: railway up

services:
  # PostgreSQL Database (TimescaleDB)
  postgres:
    image: timescale/timescaledb:latest-pg15
    env:
      POSTGRES_DB: edgecrew
      POSTGRES_USER: edgecrew
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U edgecrew"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    env:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # AI Processor Service
  ai-processor:
    build:
      context: ./services/ai-processor
      dockerfile: Dockerfile
    env:
      PORT: 8000
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      AZURE_SWEDEN_KEY: ${AZURE_SWEDEN_KEY}
      AZURE_NC_KEY: ${AZURE_NC_KEY}
      AZURE_GCE_KEY: ${AZURE_GCE_KEY}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY}
      GROK_API_KEY: ${GROK_API_KEY}
      KIMI_API_KEY: ${KIMI_API_KEY}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
    depends_on:
      - redis
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/health').raise_for_status()"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      replicas: 2

  # Convergence Service
  convergence:
    build:
      context: ./services/convergence
      dockerfile: Dockerfile
    env:
      PORT: 8000
      DATABASE_URL: postgresql://edgecrew:${POSTGRES_PASSWORD}@postgres:5432/edgecrew
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
    depends_on:
      - postgres
      - redis
      - ai-processor
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/health').raise_for_status()"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Data Ingestion Worker
  data-ingestion:
    build:
      context: ./services/data-ingestion
      dockerfile: Dockerfile
    env:
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      ODDS_API_KEY: ${ODDS_API_KEY}
      BALLDONTLIE_API_KEY: ${BALLDONTLIE_API_KEY}
    depends_on:
      - redis
    deploy:
      replicas: 1

  # Web Frontend
  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    env:
      VITE_API_URL: https://${RAILWAY_PUBLIC_DOMAIN}/api
    depends_on:
      - convergence

volumes:
  postgres_data:
  redis_data:
