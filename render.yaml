services:
  - type: web
    name: edge-crew-ai
    runtime: python
    plan: standard
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: AZURE_SWEDEN_KEY
        sync: false
      - key: AZURE_NC_KEY
        sync: false
      - key: AZURE_GCE_KEY
        sync: false
