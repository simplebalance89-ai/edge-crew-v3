# PodMonitor for Redis metrics (if using redis-exporter sidecar)
apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: redis-metrics
  namespace: edge-crew
  labels:
    app: redis
    release: prometheus
spec:
  selector:
    matchLabels:
      app: redis
  namespaceSelector:
    matchNames:
    - edge-crew
  podMetricsEndpoints:
  - port: metrics
    path: /metrics
    interval: 30s
    scrapeTimeout: 10s
