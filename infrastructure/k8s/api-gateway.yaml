apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: edge-crew
  labels:
    app: api-gateway
    component: gateway
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: 8000
    protocol: TCP
    name: http
  - port: 443
    targetPort: 8443
    protocol: TCP
    name: https
  - port: 8444
    targetPort: 8444
    protocol: TCP
    name: admin
  selector:
    app: api-gateway
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: edge-crew
  labels:
    app: api-gateway
    component: gateway
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
        component: gateway
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8100"
        prometheus.io/path: "/metrics"
    spec:
      containers:
      - name: kong
        image: kong:3.5
        ports:
        - containerPort: 8000
          name: proxy
        - containerPort: 8443
          name: proxy-ssl
        - containerPort: 8100
          name: metrics
        - containerPort: 8444
          name: admin
        env:
        - name: KONG_DATABASE
          value: "off"
        - name: KONG_DECLARATIVE_CONFIG
          value: "/kong/declarative/kong.yml"
        - name: KONG_PROXY_ACCESS_LOG
          value: "/dev/stdout"
        - name: KONG_ADMIN_ACCESS_LOG
          value: "/dev/stdout"
        - name: KONG_PROXY_ERROR_LOG
          value: "/dev/stderr"
        - name: KONG_ADMIN_ERROR_LOG
          value: "/dev/stderr"
        - name: KONG_PLUGINS
          value: "bundled,prometheus"
        - name: KONG_PLUGINSERVER_NAMES
          value: "prometheus"
        - name: REDIS_URL
          valueFrom:
            configMapKeyRef:
              name: edge-crew-config
              key: redis.url
        - name: KONG_RATE_LIMITING_REDIS_HOST
          valueFrom:
            configMapKeyRef:
              name: edge-crew-config
              key: redis.host
        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
        volumeMounts:
        - name: kong-config
          mountPath: /kong/declarative
        livenessProbe:
          httpGet:
            path: /status
            port: 8100
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /status
            port: 8100
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
      volumes:
      - name: kong-config
        configMap:
          name: kong-declarative-config
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: kong-declarative-config
  namespace: edge-crew
data:
  kong.yml: |
    _format_version: "3.0"
    _transform: true
    
    services:
    - name: data-ingestion
      url: http://data-ingestion.edge-crew.svc.cluster.local:8080
      routes:
      - name: data-ingestion-route
        paths:
        - /api/v1/ingest
        strip_path: false
        methods:
        - POST
        - GET
      plugins:
      - name: rate-limiting
        config:
          minute: 100
          policy: redis
          redis_host: redis.edge-crew.svc.cluster.local
          redis_timeout: 2000
          fault_tolerant: true
          hide_client_headers: false
    
    - name: grading-engine
      url: http://grading-engine.edge-crew.svc.cluster.local:8080
      routes:
      - name: grading-route
        paths:
        - /api/v1/grade
        strip_path: false
        methods:
        - POST
        - GET
    
    - name: ai-processor
      url: http://ai-processor.edge-crew.svc.cluster.local:8000
      routes:
      - name: ai-route
        paths:
        - /api/v1/ai
        strip_path: false
        methods:
        - POST
        - GET
    
    - name: convergence
      url: http://convergence.edge-crew.svc.cluster.local:8080
      routes:
      - name: convergence-route
        paths:
        - /api/v1/convergence
        strip_path: false
        methods:
        - POST
        - GET
    
    - name: web
      url: http://web.edge-crew.svc.cluster.local:3000
      routes:
      - name: web-route
        paths:
        - /
        strip_path: false
      plugins:
      - name: cors
        config:
          origins:
          - "*"
          methods:
          - GET
          - POST
          - PUT
          - DELETE
          - OPTIONS
          headers:
          - Authorization
          - Content-Type
          - X-Request-ID
          max_age: 3600
    
    plugins:
    - name: prometheus
      config:
        per_consumer: true
        status_code_metrics: true
        latency_metrics: true
        bandwidth_metrics: true
        upstream_health_metrics: true
