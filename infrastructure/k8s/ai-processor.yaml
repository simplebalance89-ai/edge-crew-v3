apiVersion: v1
kind: Service
metadata:
  name: ai-processor
  namespace: edge-crew
  labels:
    app: ai-processor
    component: service
spec:
  type: ClusterIP
  ports:
  - port: 8000
    targetPort: 8000
    protocol: TCP
    name: http
  selector:
    app: ai-processor
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-processor
  namespace: edge-crew
  labels:
    app: ai-processor
    component: service
spec:
  replicas: 3
  selector:
    matchLabels:
      app: ai-processor
  template:
    metadata:
      labels:
        app: ai-processor
        component: service
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - ai-processor
              topologyKey: kubernetes.io/hostname
      containers:
      - name: ai-processor
        image: edgecrew/ai-processor:latest
        ports:
        - containerPort: 8000
          name: http
        env:
        - name: SERVER_PORT
          value: "8000"
        - name: LOG_LEVEL
          valueFrom:
            configMapKeyRef:
              name: edge-crew-config
              key: log.level
        - name: REDIS_URL
          valueFrom:
            configMapKeyRef:
              name: edge-crew-config
              key: redis.url
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: edge-crew-secrets
              key: postgres.url
        - name: AI_MODEL_PATH
          valueFrom:
            configMapKeyRef:
              name: edge-crew-config
              key: ai.model.path
        - name: AI_BATCH_SIZE
          valueFrom:
            configMapKeyRef:
              name: edge-crew-config
              key: ai.batch.size
        - name: AI_INFERENCE_THREADS
          valueFrom:
            configMapKeyRef:
              name: edge-crew-config
              key: ai.inference.threads
        - name: OPENAI_API_KEY
          valueFrom:
            secretKeyRef:
              name: edge-crew-secrets
              key: ai.openai.api.key
              optional: true
        - name: ANTHROPIC_API_KEY
          valueFrom:
            secretKeyRef:
              name: edge-crew-secrets
              key: ai.anthropic.api.key
              optional: true
        resources:
          requests:
            memory: "2Gi"
            cpu: "1000m"
            nvidia.com/gpu: "1"
          limits:
            memory: "4Gi"
            cpu: "2000m"
            nvidia.com/gpu: "1"
        volumeMounts:
        - name: models
          mountPath: /models
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 60
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /ready
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        startupProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
          failureThreshold: 18
      volumes:
      - name: models
        persistentVolumeClaim:
          claimName: ai-models-pvc
      nodeSelector:
        accelerator: nvidia-gpu
      tolerations:
      - key: nvidia.com/gpu
        operator: Exists
        effect: NoSchedule
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ai-models-pvc
  namespace: edge-crew
spec:
  accessModes:
  - ReadOnlyMany
  storageClassName: standard
  resources:
    requests:
      storage: 20Gi
