apiVersion: v1
kind: Secret
metadata:
  name: edge-crew-secrets
  namespace: edge-crew
type: Opaque
stringData:
  # Database Credentials
  postgres.user: "edgecrew_user"
  postgres.password: "CHANGE_ME_IN_PRODUCTION"
  postgres.url: "postgresql://edgecrew_user:CHANGE_ME_IN_PRODUCTION@postgres.edge-crew.svc.cluster.local:5432/edgecrew?sslmode=require"
  
  # Redis Credentials (if authentication enabled)
  redis.password: ""
  
  # API Keys
  api.key.internal: "CHANGE_ME_INTERNAL_API_KEY"
  api.key.external: "CHANGE_ME_EXTERNAL_API_KEY"
  
  # JWT Secrets
  jwt.secret: "CHANGE_ME_JWT_SECRET"
  jwt.issuer: "edge-crew"
  
  # AI Service Credentials
  ai.openai.api.key: "CHANGE_ME_OPENAI_KEY"
  ai.anthropic.api.key: "CHANGE_ME_ANTHROPIC_KEY"
  
  # External Service Credentials
  external.webhook.secret: "CHANGE_ME_WEBHOOK_SECRET"
  
  # TLS Certificates (base64 encoded)
  tls.crt: ""
  tls.key: ""
---
# Sealed Secret template (for production use with sealed-secrets)
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: edge-crew-secrets-sealed
  namespace: edge-crew
spec:
  encryptedData:
    postgres.password: "AgBy..."
    jwt.secret: "AgBy..."
    api.key.internal: "AgBy..."
